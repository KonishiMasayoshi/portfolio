	<script src="./ViewTrigger.js"></script>
	
	<script>
document.addEventListener('DOMContentLoaded', () => {
	new ViewTrigger(
		'#target0', 
		{
			positionExecute: 300, 
			countExecute: 3, 
			funcCallbackShow: (
				el, 
				count 
			) => {
				el.style.backgroundColor = '#f00';
				console.log(`あいうえお表示【${count}】`);
			}, 
			funcCallbackHide: (
				el, 
				count 
			) => {
				el.style.backgroundColor = '#fff';
				console.log(`あいうえお非表示【${count}】`);
			}  
		} 
	);
	new ViewTrigger(
		'#target1', 
		{
			countExecute: false, 
			funcCallbackShow: (
				el, 
				count 
			) => {
				el.style.backgroundColor = '#f00';
				console.log(`かきくけこ表示【${count}】`);
			}, 
			funcCallbackHide: (
				el, 
				count 
			) => {
				el.style.backgroundColor = '#fff';
				console.log(`かきくけこ非表示【${count}】`);
			}  
		} 
	);
});
	</script>
