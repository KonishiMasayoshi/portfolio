<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>class - ScrollButton</title>
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0,minimum-scale=1.0">
<meta name="format-detection" content="telephone=no">
<link rel="stylesheet" href="./../../../css/default.css">
<!-- class -->
<link rel="stylesheet" href="./default.css">
<style>
.scroll_button[data-scroll-button-scroll-position="#target0"]{
	bottom:200px;
}
.scroll_button[data-scroll-button-scroll-position="#target1"]{
	bottom:300px;
}
/****************************** pc ******************************/
@media screen and (min-width:1280px){
	.scroll_button[data-scroll-button-scroll-position="top"]{
		bottom:105px;
	}
	
	.scroll_button[data-scroll-button-scroll-position="bottom"]{
		bottom:15px;
	}
}
/****************************** /pc ******************************/

/****************************** tablet ******************************/
@media screen and (min-width:769px) and (max-width:1280px){
	.scroll_button[data-scroll-button-scroll-position="top"]{
		bottom:10.5vw;
	}
	
	.scroll_button[data-scroll-button-scroll-position="bottom"]{
		bottom:1.5vw;
	}
}
/****************************** /tablet ******************************/

/****************************** sp ******************************/
@media screen and (max-width:769px){
	.scroll_button[data-scroll-button-scroll-position="top"]{
		bottom:10.5vw;
	}
	
	.scroll_button[data-scroll-button-scroll-position="bottom"]{
		bottom:1.5vw;
	}
}
/****************************** /sp ******************************/
</style>
</head>
<body>
	<div id="target0" style="width:100%; height:300px; margin-block:3000px; background:red;"></div>
	<div id="target1" style="width:100%; height:300px; margin-bottom:10px; background:blue;"></div>
	<button type="button" aria-label="ページ下部へスクロール" class="scroll_button" data-scroll-button-scroll-position="bottom"  data-scroll-button-display-toggle="true"></button>
	<a href="#target0" aria-label="対象要素へスクロール" class="scroll_button" data-scroll-button-scroll-position="#target0"  data-scroll-button-display-toggle="true">対象要素へスクロール</a>
	<a href="#target1" aria-label="対象要素へスクロール" class="scroll_button" data-scroll-button-scroll-position="#target1"  data-scroll-button-display-toggle="true">最下部要素へスクロール</a>
	<button type="button" aria-label="ページ上部にスクロール" class="scroll_button" data-scroll-button-scroll-position="top"  data-scroll-button-display-toggle="true"></button>
	
	<!-- class -->
	<script src="./ScrollButton.js"></script>
	
	<script>
document.addEventListener('DOMContentLoaded', () => {
	document.querySelectorAll('.scroll_button').forEach((el) => {
		new ScrollButton(el);
	});
});
	</script>
</body>
</html>
